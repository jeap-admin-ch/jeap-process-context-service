jeap.processcontext.frontend.stsServer=${jeap.security.oauth2.resourceserver.authorization-server.issuer}
jeap.processcontext.frontend.tokenAwarePattern=^/process-context/api/.*, ^${frontend.applicationUrl}/api/.*
spring.jpa.database=postgresql
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/please-set-db-url
spring.datasource.tomcat.jmx-enabled=true
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.pool-name="hikari-cp-${spring.application.name}"
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common, classpath:db/migration/postgres
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# This is required for 'create/drop index concurrently' to work in Flyway without hanging indefinitely. It is safe to set
# this to false as Flyway will acquire an advisory lock for the migration process, so there won't be concurrent migrations happening.
spring.flyway.postgresql.transactional-lock=false
